syntax = "proto3";

package semantic.v1;

option go_package = "github.com/smittal2001/semantic-search/proto";

// ─── Ingest Service ───────────────────────────────────────────────────────────

service IngestService {
  rpc IngestDocument(IngestRequest)   returns (IngestResponse);
  rpc GetDocument   (GetDocRequest)   returns (GetDocResponse);
  rpc DeleteDocument(DeleteDocRequest) returns (DeleteDocResponse);
}

message IngestRequest {
  string              document_id = 1; // caller-supplied idempotency key (UUID)
  string              text        = 2;
  map<string, string> metadata    = 3;
}

message IngestResponse {
  string document_id = 1;
  string status      = 2; // "queued"
}

message GetDocRequest {
  string document_id = 1;
}

message GetDocResponse {
  string              document_id = 1;
  string              text        = 2;
  map<string, string> metadata    = 3;
  string              status      = 4; // pending | indexed | failed
  string              model       = 5;
}

message DeleteDocRequest {
  string document_id = 1;
}

message DeleteDocResponse {
  bool deleted = 1;
}

// ─── Search Service ───────────────────────────────────────────────────────────

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
}

message SearchRequest {
  string query = 1;
  int32  limit = 2; // default 10, max 100
}

message SearchResult {
  string              document_id = 1;
  string              text        = 2;
  map<string, string> metadata    = 3;
  float               similarity  = 4; // 0.0 – 1.0
}

message SearchResponse {
  repeated SearchResult results = 1;
}
